<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Análise de Ações{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css"><link rel="stylesheet" href="/static/add-company.css"><link rel="stylesheet" href="/static/ticker-import.css"><link rel="stylesheet" href="/static/preferences.css"><link rel="stylesheet" href="/static/chart-layout.css">
</head>
<body>
  <header><a class="brand" href="/"><span>◆</span> Análise de Ações</a><nav><a href="/">Visão geral</a><a href="#metodologia">Metodologia</a><button class="palette-button" id="open-theme" aria-label="Escolher cores">◐</button></nav></header>
  <main>{% block content %}{% endblock %}</main>
  <footer>Ferramenta educacional. Valuation é estimativa, não recomendação de investimento.</footer>
  <dialog id="theme-dialog"><div class="modal-title"><div><p class="eyebrow">APARÊNCIA</p><h2>Paleta de cores</h2></div><button type="button" class="close" id="close-theme">×</button></div><div class="themes"><button data-theme="sage"><i></i>Verde sálvia</button><button data-theme="ocean"><i></i>Azul oceano</button><button data-theme="plum"><i></i>Ameixa</button><button data-theme="sun"><i></i>Mostarda</button></div></dialog><script src="/static/theme.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
