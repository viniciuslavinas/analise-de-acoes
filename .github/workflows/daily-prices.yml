name: Atualizar preços
on:
  schedule:
    - cron: '0 22 * * 1-5'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r requirements.txt
      - run: python -m app.jobs.update_prices
      - run: |
          git config user.name 'analise-acoes-bot'
          git config user.email 'actions@github.com'
          git add -A
          git diff --cached --quiet || git commit -m 'chore: atualizar cotações'
          git push
